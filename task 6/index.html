<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Order summary card</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
</head>

<body>

  <!-- background patterns -->
  <div class="bg-pattern">
    <!-- desktop pattern -->
    <img src="./images/pattern-background-desktop.svg" class="desktop" alt="">

    <!-- mobile pattern -->
    <img src="./images/pattern-background-mobile.svg" class="mobile" alt="">
  </div>

  <!-- ======================================================= -->
  <!-- card -->
  <!-- ======================================================= -->
  <!-- card -->
  <main class="card">
    <!-- card image -->
    <div class="card-img">
      <img src="./images/illustration-hero.svg" alt="">
    </div>

    <!-- card details -->
    <div class="card-details">
      <h2>Order Summary</h2>
      <p class="gray-600">You can now listen to millions of songs, audiobooks, and podcasts on any
        device anywhere you like!</p>
    </div>

    <!-- card plan -->
    <div class="card-plan">
      <div class="container">
        <img src="./images/icon-music.svg" alt="">
        <div style="line-height: 1.5rem;">
          <h3>Annual Plan</h3>
          <span class="gray-600">$59.99/year</span>
        </div>

        <a href="#">Change</a>
      </div>
    </div>

    <!-- action buttons -->
    <div class="btn-container">
      <button>Proceed to Payment</button>
      <a href="#" class="gray-600">Cancel Order</a>
    </div>
  </main>

  <!-- ======================================================= -->
  <!-- footer -->
  <!-- ======================================================= -->
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Abdallha Mohmamed</a>.
  </footer>
</body>

</html>
